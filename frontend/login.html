<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SentinelAI Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="login-box">

        <h2>SentinelAI</h2>

        <p style="text-align:center; margin-bottom:20px;">
            Fraud Detection System
        </p>

        <label>Email</label>

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
        >

        <label>Password</label>

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
        >

        <button onclick="login()">
            Login
        </button>

        <br><br>

        <p
            id="message"
            style="text-align:center;color:red;">
        </p>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
