<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SentinelAI - AI Explanation</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <!-- Navbar -->

    <nav>

        <h2>SentinelAI</h2>

        <ul>

            <li><a href="dashboard.html">Dashboard</a></li>

            <li><a href="predict.html">Predict</a></li>

            <li><a href="upload.html">Upload CSV</a></li>

            <li><a href="graph.html">Graph</a></li>

            <li><a href="explanation.html">AI Explanation</a></li>

            <li><a href="#" onclick="logout()">Logout</a></li>

        </ul>

    </nav>

    <!-- Main Container -->

    <div class="container">

        <h1>AI Fraud Explanation</h1>

        <p>Enter transaction details to get a plain-language, LLM-generated explanation of the risk.</p>

        <br>

        <form id="explanationForm">

            <label>Step</label>
            <input type="number" id="step" required>

            <label>Transaction Type</label>

            <select id="type">

                <option value="0">CASH_IN</option>

                <option value="1">CASH_OUT</option>

                <option value="2">DEBIT</option>

                <option value="3">PAYMENT</option>

                <option value="4">TRANSFER</option>

            </select>

            <label>Amount</label>
            <input type="number" id="amount" required>

            <label>Old Balance Sender</label>
            <input type="number" id="oldbalanceOrg" required>

            <label>New Balance Sender</label>
            <input type="number" id="newbalanceOrig" required>

            <label>Old Balance Receiver</label>
            <input type="number" id="oldbalanceDest" required>

            <label>New Balance Receiver</label>
            <input type="number" id="newbalanceDest" required>

            <label>Flagged Fraud</label>

            <select id="isFlaggedFraud">

                <option value="0">No</option>

                <option value="1">Yes</option>

            </select>

            <br><br>

            <button type="button" onclick="getExplanation()">
                Get AI Explanation
            </button>

        </form>

        <hr>

        <!-- Result Card -->

        <div id="resultCard" class="result-card" style="display:none;">

            <h2>AI Explanation Result</h2>

            <p>
                <strong>Status :</strong>
                <span id="prediction"></span>
            </p>

            <p>
                <strong>Risk Score :</strong>
                <span id="riskScore"></span>
            </p>

            <div class="progress">

                <div id="progressBar" class="progress-bar">0%</div>

            </div>

        </div>

        <br>

        <!-- Reason Card -->

        <div id="reasonCard" class="reason-card" style="display:none;">

            <h2>Reasons</h2>

            <ul id="reasonList">
            </ul>

        </div>

        <br>

        <!-- Recommendation Card -->

        <div id="recommendationCard" class="recommendation-card" style="display:none;">

            <h2>Recommendation</h2>

            <p id="recommendation"></p>

        </div>

    </div>

    <script src="js/explanation.js"></script>

</body>

</html>
